name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: dflouis

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.changes.outputs.gateway }}
      auth: ${{ steps.changes.outputs.auth }}
      realtime: ${{ steps.changes.outputs.realtime }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'Dockerfile.gateway'
            auth:
              - 'services/auth/**'
              - 'Dockerfile.auth-service'
            realtime:
              - 'services/realtime/**'
              - 'Dockerfile.realtime'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Gateway
        if: needs.detect-changes.outputs.gateway == 'true'
        run: |
          docker build \
            --build-arg PORT=3000 \
            -f Dockerfile.gateway \
            -t ${{ env.REGISTRY }}/voip-gateway:latest \
            ./services/gateway
          docker push ${{ env.REGISTRY }}/voip-gateway:latest

      - name: Build and Push Auth Service
        if: needs.detect-changes.outputs.auth == 'true'
        run: |
          docker build \
            -f Dockerfile.auth-service \
            -t ${{ env.REGISTRY }}/voip-auth-service:latest \
            ./services/auth
          docker push ${{ env.REGISTRY }}/voip-auth-service:latest

      - name: Build and Push Realtime Service
        if: needs.detect-changes.outputs.realtime == 'true'
        run: |
          docker build \
            -f Dockerfile.realtime \
            -t ${{ env.REGISTRY }}/voip-realtime:latest \
            ./services/realtime
          docker push ${{ env.REGISTRY }}/voip-realtime:latest