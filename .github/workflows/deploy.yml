name: Build and Deploy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  REGISTRY: dflouis
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.changes.outputs.gateway }}
      realtime: ${{ steps.changes.outputs.realtime }}
      frontend: ${{ steps.changes.outputs.frontend }}
      hub: ${{ steps.changes.outputs.hub }}
      musicman: ${{ steps.changes.outputs.musicman }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'Dockerfile.gateway'
            realtime:
              - 'services/realtime/**'
              - 'Dockerfile.realtime'
            frontend:
              - 'voip_frontend/**'
              - 'Dockerfile.frontend'
              - 'nginx.conf'
            voipserver:
              - 'services/VoIPServer/**'
              - 'Dockerfile.voip-server'
            hub:
              - 'Dockerfile.hub-service'
            musicman:
              - 'services/musicman-service/**'
              - 'Dockerfile.musicman-service'
  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and Push Gateway
        run: |
          docker build \
            --build-arg PORT=3000 \
            -f Dockerfile.gateway \
            -t ${{ env.REGISTRY }}/p2p-voip-gateway:latest \
            ./services/gateway
          docker push ${{ env.REGISTRY }}/p2p-voip-gateway:latest
      - name: Build and Push Realtime Service
        run: |
          docker build \
            -f Dockerfile.realtime \
            -t ${{ env.REGISTRY }}/p2p-voip-realtime:latest \
            ./services/realtime
          docker push ${{ env.REGISTRY }}/p2p-voip-realtime:latest
      - name: Build and Push VoIP Server
        run: |
          docker build \
            -f Dockerfile.voip-server \
            -t ${{ env.REGISTRY }}/p2p-voip-server:latest \
            .
          docker push ${{ env.REGISTRY }}/p2p-voip-server:latest
      - name: Build and Push Hub Service
        run: |
          docker build \
            -f Dockerfile.hub-service \
            -t ${{ env.REGISTRY }}/p2p-hub-service:latest \
            .
          docker push ${{ env.REGISTRY }}/p2p-hub-service:latest
      - name: Build and Push Musicman Service
        run: |
          docker build \
            -f Dockerfile.musicman-service \
            -t ${{ env.REGISTRY }}/p2p-musicman-service:latest \
            ./services/musicman-service
          docker push ${{ env.REGISTRY }}/p2p-musicman-service:latest
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Build Frontend
        working-directory: ./voip_frontend
        run: |
          npm ci
          rm -rf dist .vite
          npm run build -- --mode production
      - name: Copy frontend build
        run: cp -r voip_frontend/dist ./
      - name: Build and Push Frontend
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t ${{ env.REGISTRY }}/p2p-voip-frontend:latest \
            .
          docker push ${{ env.REGISTRY }}/p2p-voip-frontend:latest