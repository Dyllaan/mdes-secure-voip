name: Security Scan
on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'
          format: 'table'
        continue-on-error: true

      - name: npm audit (gateway)
        working-directory: ./services/gateway
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit (realtime)
        working-directory: ./services/realtime
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit (musicman)
        working-directory: ./services/musicman-service
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit (frontend)
        working-directory: ./voip_frontend
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true

      - name: Go vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          work-dir: services/hub-service
          go-version-file: services/hub-service/go.mod
          go-package: ./...
        continue-on-error: true

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/golang
            p/java
            p/secrets
        continue-on-error: true