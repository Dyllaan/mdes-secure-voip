#dev
services:
  p2p-voip-gateway:
    build:
      context: ./services/gateway
      dockerfile: ../../Dockerfile.gateway
    container_name: voip-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL}
      - AUTH_SERVICE_URL=http://voip-auth-service:8010
      - REALTIME_SERVICE_URL=http://voip-realtime:9001
      - PEER_SERVICE_URL=http://voip-realtime:9000
      - HUB_SERVICE_URL=http://hub-service:8080
      - MUSICMAN_URL=http://musicman-service:4000
      - CORS_ORIGIN=${ALLOWED_ORIGINS}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - TURN_SECRET=${TURN_SECRET}
    depends_on:
      p2p-auth-service:
        condition: service_healthy
      p2p-voip-realtime-service:
        condition: service_started
      p2p-hub-service:
        condition: service_healthy
    networks:
      - voip-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  p2p-auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../Dockerfile.auth-service
    container_name: voip-auth-service
    expose:
      - "8010"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/postgres?sslmode=disable
      - SPRING_DATASOURCE_USERNAME=auth-db-user
      - SPRING_DATASOURCE_PASSWORD=${AUTH_DB_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - JWT_PRIVATE_KEY_B64=${JWT_PRIVATE_KEY_B64}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - DEMO_MODE=${DEMO_MODE}
      - DEMO_ALLOWED_USERS=${DEMO_ALLOWED_USERS}
      - DEMO_TIME_LIMIT_SECONDS=${DEMO_TIME_LIMIT_SECONDS}
      - ACCESS_TOKEN_EXP_SECONDS=${ACCESS_TOKEN_EXP_SECONDS}
      - REFRESH_TOKEN_EXP_SECONDS=${REFRESH_TOKEN_EXP_SECONDS}
      - MFA_TOKEN_EXP_SECONDS=${MFA_TOKEN_EXP_SECONDS}
      - DEMO_TOKEN_EXP_SECONDS=${DEMO_TOKEN_EXP_SECONDS}
      - TRUSTED_DEVICE_VALIDITY_DAYS=${TRUSTED_DEVICE_VALIDITY_DAYS}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    networks:
      - voip-network
    depends_on:
      p2p-auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  p2p-voip-realtime-service:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    container_name: voip-realtime
    environment:
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - REALTIME_PORT=9001
      - PEER_PORT=9000
      - HUB_SERVICE_URL=http://voip-gateway:3000/hub
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    networks:
      - voip-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  p2p-hub-service:
    build:
      context: .
      dockerfile: Dockerfile.hub-service
    container_name: hub-service
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgres://postgres:${HUB_DB_PASSWORD}@hub-service-db:5432/hub-service?sslmode=disable
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - PORT=8080
      - BOT_SECRET=${BOT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - INVITE_TTL_HOURS=24
    depends_on:
      p2p-hub-service-db:
        condition: service_healthy
    networks:
      - voip-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  p2p-hub-service-db:
    image: postgres:16-alpine
    container_name: hub-service-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${HUB_DB_PASSWORD}
      - POSTGRES_DB=hub-service
    volumes:
      - hub-service-db-data:/var/lib/postgresql/data
    networks:
      - voip-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hub-service"]
      interval: 5s
      timeout: 3s
      retries: 10

  p2p-auth-db:
    image: postgres:latest
    container_name: auth-db
    environment:
      - POSTGRES_USER=auth-db-user
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - auth-db-data:/var/lib/postgresql
    restart: always
    networks:
      - voip-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth-db-user -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  p2p-musicman-service:
    build:
      context: ./services/musicman-service
      dockerfile: ../../Dockerfile.musicman-service
    container_name: musicman-service
    expose:
      - "4000"
    environment:
      - GATEWAY_URL=http://voip-gateway:3000
      - SIGNALING_URL=http://voip-gateway:3000
      - AUTH_URL=http://voip-gateway:3000/auth
      - HUB_SERVICE_URL=http://voip-gateway:3000/hub
      - BOT_SECRET=${BOT_SECRET}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - PEER_HOST=voip-gateway
      - PEER_PORT=3000
      - PEER_PATH=/peerjs
      - PEER_SECURE=false
      - BOT_USERNAME=musicman
      - BOT_PASSWORD=${BOT_PASSWORD}
      - PORT=4000
      - PEER_ID_EVENT=peer-assigned
      - PEER_ID_KEY=peerId
      - DEBUG_BOT=1
      - YTDLP_MAX_FILESIZE_MB=${YTDLP_MAX_FILESIZE_MB}
      - TURN_HOST=${TURN_HOST}
      - TURN_PORT=${TURN_PORT}
      - TURN_SECURE=${TURN_SECURE}
      - ALLOWED_VIDEO_ORIGINS:=${ALLOWED_VIDEO_ORIGINS}
      - ALLOWED_AUDIO_ORIGINS:=${ALLOWED_AUDIO_ORIGINS}
    depends_on:
      p2p-voip-gateway:
        condition: service_healthy
      p2p-auth-service:
        condition: service_healthy
      p2p-voip-realtime-service:
        condition: service_started
    networks:
      - voip-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  p2p-coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      - "13478:3478/tcp"
      - "13478:3478/udp"
    command: >
      -n
      --log-file=stdout
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-tls
      --no-dtls
      --realm=${COTURN_REALM}
      --static-auth-secret=${TURN_SECRET}
      --allow-loopback-peers
      --external-ip=${COTURN_EXTERNAL_IP}
    networks:
      voip-network:
        ipv4_address: 10.10.10.10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: redis
    user: "999"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - voip-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  auth-db-data:
  hub-service-db-data:
  redis-data:

networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
