services:
  p2p-voip-gateway:
    build:
      context: ./services/gateway
      dockerfile: ../../Dockerfile.gateway
    container_name: voip-gateway
    ports:
      - "9000:9000"
      - "3000:3000"
    expose:
      - "9000"
    environment:
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL}
      - AUTH_SERVICE_URL=http://voip-auth-service:8010
      - REALTIME_SERVICE_URL=http://voip-realtime:9001
      - PEER_SERVICE_URL=http://voip-realtime:9000
      - HUB_SERVICE_URL=http://hub-service:8080
      - MUSICMAN_URL=http://musicman-service:4000
      - CORS_ORIGIN=${ALLOWED_ORIGINS}
      - JWT_SECRET=${SECRET_KEY}
      - TURN_SECRET=${TURN_SECRET}
      - REDIS_URL=redis://redis:6379
      - DEMO_TIME_LIMIT_SECONDS=${DEMO_TIME_LIMIT_SECONDS}
      - DEMO_MODE=${DEMO_MODE}
    depends_on:
      - p2p-voip-realtime-service
      - redis
    networks:
      - voip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  p2p-auth-service:
    image: dflouis/dedicate-auth-service:latest
    container_name: voip-auth-service
    expose:
      - "8010"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/postgres?sslmode=disable
      - SPRING_DATASOURCE_USERNAME=nanny
      - SPRING_DATASOURCE_PASSWORD=${AUTH_DB_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SECRET_KEY=${SECRET_KEY}
      - TEMP_MFA_SECRET_KEY=${TEMP_MFA_SECRET_KEY}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - CORS_ALLOWED_ORIGINS=http://voip-gateway:3000
    restart: always
    networks:
      - voip-network
    depends_on:
      - p2p-auth-db
      - redis

  p2p-voip-realtime-service:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    container_name: voip-realtime
    expose:
      - "9001"
      - "9000"
    environment:
      - JWT_SECRET=${SECRET_KEY}
      - REALTIME_PORT=9001
      - PEER_PORT=9000
      - HUB_SERVICE_URL=http://voip-gateway:3000/hub
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    networks:
      - voip-network
    restart: unless-stopped

  p2p-hub-service:
    build:
      context: .
      dockerfile: Dockerfile.hub-service
    container_name: hub-service
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgres://postgres:${HUB_DB_PASSWORD}@hub-service-db:5432/hub-service?sslmode=disable
      - JWT_SECRET=${SECRET_KEY}
      - PORT=8080
      - BOT_SECRET=${BOT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - INVITE_TTL_HOURS=24
    depends_on:
      - p2p-hub-service-db
    networks:
      - voip-network
    restart: unless-stopped

  p2p-hub-service-db:
    image: postgres:16-alpine
    container_name: hub-service-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${HUB_DB_PASSWORD}
      - POSTGRES_DB=hub-service
    volumes:
      - hub-service-db-data:/var/lib/postgresql/data
    networks:
      - voip-network
    restart: unless-stopped

  p2p-auth-db:
    image: postgres:latest
    container_name: auth-db
    environment:
      - POSTGRES_USER=nanny
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - auth-db-data:/var/lib/postgresql
    restart: always
    networks:
      - voip-network

  p2p-musicman-service:
    build:
      context: ./services/musicman-service
      dockerfile: ../../Dockerfile.musicman-service
    container_name: musicman-service
    expose:
      - "4000"
    environment:
      - GATEWAY_URL=http://voip-gateway:3000
      - SIGNALING_URL=http://voip-gateway:3000
      - AUTH_URL=http://voip-gateway:3000/auth
      - HUB_SERVICE_URL=http://voip-gateway:3000/hub
      - BOT_SECRET=${BOT_SECRET}
      - JWT_SECRET=${SECRET_KEY}
      - PEER_HOST=voip-gateway
      - PEER_PORT=3000
      - PEER_PATH=/peerjs
      - PEER_SECURE=false
      - BOT_USERNAME=musicman
      - BOT_PASSWORD=${BOT_PASSWORD}
      - PORT=4000
      - PEER_ID_EVENT=peer-assigned
      - PEER_ID_KEY=peerId
      - DEBUG_BOT=1
      - YTDLP_MAX_FILESIZE_MB=${YTDLP_MAX_FILESIZE_MB}
      - TURN_HOST=${TURN_HOST}
      - TURN_PORT=${TURN_PORT}
      - TURN_SECURE=${TURN_SECURE}
      - ALLOWED_VIDEO_ORIGINS:=${ALLOWED_VIDEO_ORIGINS}
      - ALLOWED_AUDIO_ORIGINS:=${ALLOWED_AUDIO_ORIGINS}
    depends_on:
      p2p-voip-gateway:
        condition: service_healthy
      p2p-auth-service:
        condition: service_started
      p2p-voip-realtime-service:
        condition: service_started
    networks:
      - voip-network

  p2p-coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      - "13478:3478/tcp"
      - "13478:3478/udp"
    command: >
      -n
      --log-file=stdout
      --lt-cred-mech
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-tls
      --no-dtls
      --realm=${COTURN_REALM}
      --static-auth-secret=${TURN_SECRET}
      --allow-loopback-peers
      --external-ip=${COTURN_EXTERNAL_IP}
    networks:
      voip-network:
        ipv4_address: 10.10.10.10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - voip-network

volumes:
  auth-db-data:
  hub-service-db-data:
  redis-data:

networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24