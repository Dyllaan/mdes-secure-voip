services:
  p2p-voip-gateway:
    image: dflouis/p2p-voip-gateway:latest
    container_name: voip-gateway
    ports:
      - "9000:9000"
      - "3000:3000"
    expose:
      - "9000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://voip-auth-service:8010
      - REALTIME_SERVICE_URL=http://voip-realtime:9001
      - PEER_SERVICE_URL=http://voip-realtime:9000
    depends_on:
      - p2p-voip-realtime-service
    networks:
      - voip-network
    restart: unless-stopped

  p2p-auth-service:
    image: dflouis/dedicate-auth-service:latest
    container_name: voip-auth-service
    expose:
      - "8010"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/postgres?sslmode=disable
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=RPA8Ze0gjO2kh5/m((j7](bbh^\]0|X7K{Y'=<a=g0VEwC#Ti
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SECRET_KEY=muna4fQehgByYhRtwKx64deWiTVZR67U81yAdDDqq7p6CYaUCvcJXs0a1w38QTL887sN7VsixBjHlHRv7WWvKO
      - TEMP_MFA_SECRET_KEY=vpNPLT3iXxaRXOY0SSvdnUCeXucbF3JqmdCvFExRvUs23RDeCoEYC6rz8zTqxPWjaAjUjYQn7uST6ZUf86SlHB
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: always
    networks:
      - voip-network

  p2p-voip-realtime-service:
    build:
      context: ../services/realtime
      dockerfile: ../../Dockerfile.realtime
    container_name: voip-realtime
    expose:
      - "9001"
      - "9000"
    environment:
      - JWT_SECRET=muna4fQehgByYhRtwKx64deWiTVZR67U81yAdDDqq7p6CYaUCvcJXs0a1w38QTL887sN7VsixBjHlHRv7WWvKO
      - REALTIME_PORT=9001
      - PEER_PORT=9000
    networks:
      - voip-network
    restart: unless-stopped

  p2p-voip-server:
    build:
      context: ../services/VoIPServer
      dockerfile: ../../Dockerfile.voip-server
    container_name: voip-server
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@voip-server-db:5432/server_service?sslmode=disable
      - JWT_SECRET=muna4fQehgByYhRtwKx64deWiTVZR67U81yAdDDqq7p6CYaUCvcJXs0a1w38QTL887sN7VsixBjHlHRv7WWvKO
      - PORT=8080
    depends_on:
      - p2p-voip-server-db
    networks:
      - voip-network
    restart: unless-stopped

  p2p-voip-server-db:
    image: postgres:16-alpine
    container_name: voip-server-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=server_service
    volumes:
      - voip-server-db-data:/var/lib/postgresql/data
    networks:
      - voip-network
    restart: unless-stopped

  p2p-auth-db:
    image: postgres:latest
    container_name: auth-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=RPA8Ze0gjO2kh5/m((j7](bbh^\]0|X7K{Y'=<a=g0VEwC#Ti
      - POSTGRES_DB=postgres
    volumes:
      - auth-db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: always
    networks:
      - voip-network

volumes:
  auth-db-data:
  voip-server-db-data:

networks:
  voip-network:
    driver: bridge
