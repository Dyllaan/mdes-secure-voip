events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;

    server {
        listen 80;
        listen [::]:80;
        server_name mdes.sh;

        root /usr/share/nginx/html;
        index index.html;

        # API proxy for the Talk service
        location /api/ {
            # REPLACE 'talk-backend' with your actual backend container name and port
            proxy_pass http://p2p-voip-gateway:9000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}