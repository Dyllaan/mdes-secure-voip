events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name dedicate.louisfiges.com;
        
        # Let's Encrypt challenge location
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }
        
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name dedicate.louisfiges.com;
        
        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/dedicate.louisfiges.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dedicate.louisfiges.com/privkey.pem;
        
        # SSL configuration (modern, secure settings)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/share/nginx/html;
        index index.html;

        # API proxy
        location /api/ {
            proxy_pass http://api-gateway:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # React app routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}