pid /tmp/nginx.pid;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    server_tokens off;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;
        listen [::]:8080;
        root /usr/share/nginx/html;
        index index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' ws://localhost:3000 http://localhost:3000 wss://mdes.sh https://mdes.sh; img-src 'self' data:; style-src 'self' 'unsafe-inline'; media-src 'self' blob:;" always;        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}